version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=prime_db
      - POSTGRES_USER=prime_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - prime-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=prime_db
      - DB_USERNAME=prime_user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
    depends_on:
      - db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  prime-db-data:
